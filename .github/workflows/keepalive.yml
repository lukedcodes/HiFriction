name: Keep Supabase awake

# Free-tier Supabase projects pause after 7 days with no activity. A low-traffic
# pre-launch site can easily go quiet that long, so we ping the REST API on a
# schedule. The request itself counts as activity and resets the pause timer.
# (Internal pg_cron does NOT count — it has to be an external request like this.)

on:
  schedule:
    # Every 2 days at 05:23 UTC. Off-the-hour minute since GitHub is more likely
    # to drop scheduled runs at :00 under load. Worst-case gap stays well under 7 days.
    - cron: "23 5 */2 * *"
  workflow_dispatch: # lets you run it by hand from the Actions tab to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Read one row from the waitlist table
        run: |
          curl --fail --silent --show-error \
            "${SUPABASE_URL}/rest/v1/waitlist?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}"
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
